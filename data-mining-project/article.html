<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資料探勘</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
    <link rel="stylesheet" href="static/css/me.css">
    <link rel="icon" href="icon.png"/>

</head>
<body>

    <!--導航-->
    <nav class="ui inverted attached segment m-padded-tb-mini">
        <div class="ui container">
            <div class="ui inverted secondary stackable menu">
                <h2 class="ui teal header item">資料探勘</h2>
                <a href="index.html" class="m-item item m-mobile-hide"><i class="map icon"></i>地圖</a>
                <div class="m-item item m-mobile-hide"><i class="idea icon"></i>論述</div>
            </div>
        </div>
        <a href="#" class="ui menu toggle black icon button m-top-right m-mobile-show">
            <i class="sidebar icon"></i>
        </a>
    </nav>

    <!--內容-->
    <div class="m-container-small m-padded-tb-big">

        <div class="ui container">

<!--            頭部-->
            <div class="ui top attached segment">
                <div class="ui horizontal link list">
                    <h2>台南旅遊景點</h2>
                </div>
            </div>

<!--            圖片-->
            <div id="title-picture" class="ui attached segment">
                <img src="https://unsplash.it/800/450?image=100" alt="" class="ui fluid rounded image">
            </div>
<!--            內容-->
            <div class="ui js-toc-content attached padded segment">

                <h2 class="ui center aligned header">胖胖鴨鴨</h2>

                <br>


<!--            文章內容-->
                <div id="content" class="typo typo-selection js-toc-content m-padded-lr-responsive m-padded-tb-large">

                    文章

                </div>


                <br>



<!--                讚賞-->
                <div class="ui center aligned basic segment">
                    <button id="payButton" class="ui orange basic circular button">
                        讚賞
                    </button>
                </div>
<!--                圖示-->
                <div class="ui flowing payQR popup top left transition hidden">
                    <div class="ui orange basic label">
                        <div class="ui images">
                            <div class="image">
                                <img src="" alt="" class="ui rounded bordered image" style="width: 120px">
                            </div>
                            <div class="image">
                                <img src="" alt="" class="ui rounded bordered image" style="width: 120px">
                            </div>
                        </div>
                    </div>
                </div>



            </div>
<!--            訊息-->
            <div class="ui attached positive message">
                <div class="ui middle aligned grid">
                    <div class="eleven wide column">
                        <h3>資料來源</h3>
                        <ui class="list">
                            <li>鴨子</li>
                            <li>鴨子</li>
                        </ui>
                    </div>

                    <div class="five wide column">

                    </div>
                </div>
            </div>

        </div>
    </div>

<!--    浮動頁面目錄-->
    <div class="m-padded m-fixed m-right-bottom">
        <div class="ui vertical icon buttons">
            <a href="#title-picture" class="ui toc teal button">標題</a>
            <a href="#comment-container" class="ui teal button">留言</a>
            <a href="#title-picture" class="ui teal button"><i class="chevron up icon"></i></a>
        </div>
    </div>

    <br>
    <br>
    <br>

    <!--footer-->
    <footer class="ui inverted vertical segment">
        <div class="ui center aligned container">
            <div class="ui inverted divided stackable grid">
                <div class="three wide column">
                    <div class="ui inverted link list">
                        <div class="item">


                        </div>
                    </div>
                </div>
            </div>
            <div class="ui inverted section divider"></div>
        </div>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.2/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.js"></script>

    <script>
        $('.menu.toggle').click(function () {
            $('.m-item').toggleClass('m-mobile-hide');
        });

        $(' #payButton').popup({
            popup : $('.payQR.popup'),
            on : 'click',
            position: 'bottom center'
        });


    </script>
</body>
</html>
